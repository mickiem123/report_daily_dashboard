<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>validation tests</title>
  <style>
    body { background:#07080a; color:#e7e7e7; font-family:monospace; padding:24px; }
    #results > div { margin:4px 0; }
  </style>
</head>
<body>
  <h1>validation.js tests</h1>
  <div id="results"></div>

  <script src="lib/test-runner.js"></script>
  <script src="../public/js/compute.js"></script>
  <script src="../public/js/validation.js"></script>
  <script>
    const V = window.validation;

    test("date format invalid => error", () => {
      const out = V.validateCell({ field: "ngay", value: "2026/05/08" });
      assertEq(out.severity, "error");
    });

    test("numeric non-number => error", () => {
      const out = V.validateCell({ field: "gtgd_cs_ssi", value: "abc" });
      assertEq(out.message, "Phải là số");
    });

    test("percent outside range => warn", () => {
      const out = V.validateCell({ field: "ty_le_scash_casa", value: 1.2 });
      assertEq(out.severity, "warn");
    });

    test("outlier robust z > 3 => outlier", () => {
      const history = [10, 10, 10, 10, 10, 10, 10];
      const out = V.validateCell({ field: "gtgd_cs_ssi", value: 100, history });
      assertEq(out.severity, "outlier");
      assert(out.message.includes("z="), "expected z in message");
    });

    test("insufficient history => no outlier", () => {
      const history = [10, 10, 10, 10];
      const out = V.validateCell({ field: "gtgd_cs_ssi", value: 100, history });
      assertEq(out, null);
    });

    window.runTests();
  </script>
</body>
</html>
