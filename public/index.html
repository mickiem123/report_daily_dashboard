<!doctype html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SSI Dashboard</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header>
    <h1 style="margin: 0">SSI Bao Cao</h1>
    <p style="margin: 4px 0 0; color: var(--text-muted)">Live dashboard</p>
  </header>

  <section id="daily" data-mode="daily">
    <div class="section-header">
      <h2>Bao cao ngay <span class="period-label">...</span></h2>
      <div class="section-actions"></div>
    </div>
    <div class="content"><div class="loading">...</div></div>
  </section>

  <section id="weekly" data-mode="weekly">
    <div class="section-header">
      <h2>Bao cao tuan <span class="period-label">...</span></h2>
      <div class="section-actions"></div>
    </div>
    <div class="content"><div class="loading">...</div></div>
  </section>

  <section id="monthly" data-mode="monthly">
    <div class="section-header">
      <h2>Bao cao thang <span class="period-label">...</span></h2>
      <div class="section-actions"></div>
    </div>
    <div class="content"><div class="loading">...</div></div>
  </section>

  <script src="assets/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/compute.js"></script>
  <script src="js/extractors.js"></script>
  <script src="js/render.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
